<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Into The Mist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon"
        href="https://res.cloudinary.com/dd4rdtrig/image/upload/v1765754698/ffxiv_logo_black_text_patch_7.0_pgijf1.png"
        type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2.1">
</head>

<body>
    <div class="banner-container">
        <div class="logo-circle logo-center">
            <img id="main-logo"
                src="https://res.cloudinary.com/dd4rdtrig/image/upload/v1765754698/ffxiv_logo_black_text_patch_7.0_pgijf1.png"
                alt="Logo" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
        </div>
    </div>

    <!-- Audio Control -->
    <button id="audio-toggle" class="audio-btn" aria-label="Toggle Music"><span id="audio-icon">🔇</span></button>
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme"><span id="theme-icon">🌙</span></button>

    <main>
        <div id="login-view">
            <div class="auth-container">
                <div class="auth-header">
                    <h2>Connexion</h2>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label>Entrez votre email</label>
                        <input type="email" id="email" placeholder="Email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Entrez votre mot de passe</label>
                        <input type="password" id="password" placeholder="Mot de passe" class="form-input" required>
                    </div>
                    <button type="submit" class="btn-primary" id="login-btn">Se connecter</button>
                    <p id="error-msg" style="color: red; text-align: center; font-size: 0.9rem; display: none;"></p>
                </form>
                <div class="auth-links">
                    <a href="#">J'ai oublié mon mot de passe</a><br>
                    <span>Vous n'avez pas encore de compte ? <a href="#">Inscription ici</a></span>
                </div>
            </div>
            <section id="supabase-data"></section>
        </div>
    </main>

    <script type="module" src="/src/js/pages/login.js"></script>
</body>

</html>
